  <style>
    :root{
      --bg-dark:#1e1e1e;
      --ink-light:#f5f5f5;

      --light-bg:#f4f4f4;
      --ink-dark:#222;

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--ink-light);

      color: var(--ink-dark);
      padding: 20px;
      font-size: 2rem;
      font-weight: bold;

    .header-inner{
      max-width:1000px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
      padding:24px 20px;
      text-align:center;
    }

    .header-title{
      font-weight:900;
      letter-spacing:2px;
      font-size:1.4rem;
      line-height:1.2;
      color: var(--ink-dark);
      text-align:center;
    }

    .header-title .divider{

    .header-links{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:4px;
    }

    .header-links a{
      color: var(--ink-dark);
      font-weight:700;
      font-size:.85rem;
      letter-spacing:.3px;
      text-decoration:none;
    }

    .header-links a:hover{
      text-decoration:underline;
    }

    /* MAIN */
    main{
      flex:1;
      max-width:1000px;
      margin:0 auto;
      padding:40px 20px 20px;
      width:100%;
    }

    h2{
      font-size:1.8rem;
      margin:0 0 20px;
      text-align:center;
    }

    p{ margin:0 0 16px; line-height:1.65; }

    /* CONTACT BLOCK (mirrors .about-text / .video-section divider pattern) */
    .contact-block{
      margin-top:34px;
      padding-top:26px;
      border-top:1px solid var(--line);
    }

    .contact-grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap:28px;
      align-items:start;
      margin-top:20px;
    }

    .row .label{
      font-weight:700;
      margin-bottom:4px;
    }

    .hint{
      font-size:.9rem;
      color: var(--ink-muted);
      margin-top:8px;
    }

    /* stack contact rows on mobile */
    @media (max-width:760px){
      .contact-grid{ grid-template-columns:1fr; gap:22px; }
    }

    /* BUTTONS */
    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:14px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:none;
      border:none;
      padding:4px 0;
      color: var(--ink-light);
      font-weight:700;
      font-family:inherit;
      font-size:1rem;
      letter-spacing:.3px;
      cursor:pointer;
      text-decoration:none;
      transition: opacity .15s ease;
    }

    .btn:hover{
      text-decoration:underline;
    }

    .btn.primary{
      color: var(--ink-light);
    }

    .btn:disabled{
      opacity:.55;
      cursor:default;
      text-decoration:none;
    }

    .notice{
      margin-top:28px;
      padding-top:18px;
      border-top:1px solid var(--line);
      color: var(--ink-muted);
      font-size:.95rem;
    }

    /* ---------- SOCIALS (same as about.html) ---------- */
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin: 18px 0 0;
      padding: 14px 0 6px;
    }

    .social-icons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-light);
      opacity: 0.9;
      transition: opacity 0.15s ease;
    }

    .social-icons a:hover {
      opacity: 1;
    }

    .social-icons svg {
      width: 36px;
      height: 36px;
      display: block;
    }

    /* FOOTER */
    footer{

    /* RESPONSIVE: tablet */

    }

    @media (max-width:380px){

    }

<script>
// Build email only in JS — never in HTML
function buildEmail() {
  const user = "justine.leigh.kelly";
  const domain = "outlook.com";
  return user + "@" + domain;
}

// Honeypot check + email reveal + mailto
function revealAndSend(subject) {
  const honeypot = document.getElementById("hp").value;

  // If honeypot filled → bot → block silently
  if (honeypot.trim() !== "") return;

  const email = buildEmail();
  document.getElementById("emailText").textContent = email;

  const link = document.createElement("a");
  link.href = "mailto:" + email + "?subject=" + encodeURIComponent(subject);
  link.style.display = "none";
  document.body.appendChild(link);
  link.click();
  link.remove();
}

// Three separate functions (harder for bots)
function sendFeedback() {
  revealAndSend("Feedback for Modern English Australia");
}

function sendQuote() {
  revealAndSend("Request for Quote");
}

function sendQuestion() {
  revealAndSend("General Question");
}

// Phone reveal
document.getElementById("revealPhoneBtn").addEventListener("click", function () {
  const phoneText = document.getElementById("phoneText");
  phoneText.style.display = "block";

  this.textContent = "Number shown";
  this.disabled = true;
});
</script>
